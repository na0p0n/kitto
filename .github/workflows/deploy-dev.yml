name: Deploy Dev

on:
  push:
    branches: ['develop']

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/na0p0n/kitto/backend
  FRONTEND_IMAGE: ghcr.io/na0p0n/kitto/frontend

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build & Push backend (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:dev
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,scope=backend-dev,mode=max

  build-frontend:
    name: Build & Push frontend (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:dev
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ vars.GA_MEASUREMENT_ID }}
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,scope=frontend-dev,mode=max
