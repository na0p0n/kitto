spring.application.name=kitto-backend
server.port=8080

# SQLite
spring.datasource.url=jdbc:sqlite:${KITTO_DB_PATH:/app/data/kitto.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# CORS: ローカル開発用（本番は nginx が同一オリジンでルーティングするため不要）
# 本番環境では環境変数 KITTO_CORS_ALLOWED_ORIGINS で上書き可能
kitto.cors.allowed-origins=http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Request logging
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
