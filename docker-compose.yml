services:
  backend:
    image: ghcr.io/na0p0n/kitto/backend:${IMAGE_TAG:-latest}
    container_name: kitto-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    environment:
      - KITTO_CORS_ALLOWED_ORIGINS=${KITTO_CORS_ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/na0p0n/kitto/frontend:${IMAGE_TAG:-latest}
    container_name: kitto-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
