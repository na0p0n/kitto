services:
  nginx:
    image: nginx:alpine
    container_name: kitto-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18010}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  backend:
    image: ghcr.io/na0p0n/kitto/backend:${IMAGE_TAG:-latest}
    container_name: kitto-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - KITTO_CORS_ALLOWED_ORIGINS=${KITTO_CORS_ALLOWED_ORIGINS}
    volumes:
      - kitto-db:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/na0p0n/kitto/frontend:${IMAGE_TAG:-latest}
    container_name: kitto-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kitto-db:
